services:
  - type: web
    name: archgen-ai-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FRONTEND_ORIGINS
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: REPLICATE_MODEL_VERSION
        sync: false
      - key: STABILITY_API_KEY
        sync: false
      - key: STABILITY_ENGINE_ID
        value: stable-diffusion-v1-5
